name: Bug 报告
description: 报告 TreeletHub 应用问题（非源代码仓库）
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息。本仓库为产品说明页，不含源码。
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - macOS
        - iOS
        - Mac + iOS
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: TreeletHub 版本
      placeholder: "例如 1.0.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 1. … 2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
