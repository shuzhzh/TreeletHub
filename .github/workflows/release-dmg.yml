name: Publish macOS DMG Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release with DMG
        uses: softprops/action-gh-release@v2
        with:
          name: TreeletHub ${{ github.ref_name }} for macOS
          body_path: docs/release-notes-${{ github.ref_name }}.md
          files: releases/TreeletHub.dmg
          fail_on_unmatched_files: true
          generate_release_notes: false
